<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드라마 편성표</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--s1:#0e1018;--s2:#141620;--s3:#1c1f2e;
  --bd:#21253a;--bd2:#2e334f;
  --a1:#4f8ef7;--a2:#e85d8a;--a3:#00c9a7;--gold:#f5c842;--warn:#ff6b35;
  --txt:#eef0ff;--dim:#5a607a;--dim2:#8890b0;
  --r:8px;--r2:12px;--r3:16px;
  --mono:'Syne',sans-serif;--sans:'Noto Sans KR',sans-serif;
  --fs-cell:.75rem;--col-gap:4px;--tbl-pad:10px;--hdr-pad:12px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(79,142,247,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 30% at 85% 80%,rgba(232,93,138,.05) 0%,transparent 70%)}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

header{display:flex;align-items:center;gap:12px;padding:var(--hdr-pad) 20px;
  border-bottom:1px solid var(--bd);background:rgba(7,8,15,.92);
  backdrop-filter:blur(16px);position:sticky;top:0;z-index:200}
.logo-mark{width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text h1{font-family:var(--mono);font-size:.88rem;font-weight:700}
.logo-text p{font-size:.58rem;color:var(--dim2);margin-top:1px;font-family:var(--mono)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-stat{font-family:var(--mono);font-size:.63rem;color:var(--a1);
  background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);border-radius:20px;padding:3px 10px}
.sync-status{font-family:var(--mono);font-size:.6rem;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px}
.sync-status.ok{color:var(--a3);background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.2)}
.sync-status.err{color:var(--warn);background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2)}
.sync-status.syncing{color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.syncing .sync-dot{animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{to{opacity:.3}}
.btn-add{display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;color:#fff;
  padding:7px 13px;border-radius:var(--r);font-family:var(--sans);font-size:.76rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .1s}
.btn-add:hover{opacity:.88}.btn-add:active{transform:scale(.97)}
.btn-icon{background:var(--s2);border:1px solid var(--bd);color:var(--dim2);
  width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;font-size:.78rem}
.btn-icon:hover{border-color:var(--bd2);color:var(--txt)}

.setup-banner{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);
  border-radius:var(--r);padding:10px 16px;margin:10px 16px 0;
  display:flex;align-items:center;gap:12px;font-size:.73rem;color:var(--gold)}
.setup-banner button{margin-left:auto;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);
  color:var(--gold);padding:4px 10px;border-radius:6px;font-size:.68rem;cursor:pointer}
.setup-banner button:hover{background:rgba(245,200,66,.25)}

/* ── TV 편성표 ── */
.week-wrap{flex:1;padding:var(--tbl-pad);overflow:auto}
.sched{width:100%;border-collapse:collapse;table-layout:fixed}
.sched th{padding:7px 6px;font-family:var(--mono);font-size:.7rem;font-weight:800;
  letter-spacing:.05em;border:1px solid var(--bd);background:var(--s1);
  position:sticky;top:0;z-index:10;text-align:center;white-space:nowrap}
.sched td{vertical-align:top;padding:4px;border:1px solid var(--bd);background:var(--s1)}
.th-mon{color:#4f8ef7}.th-tue{color:#ff9f43}.th-wed{color:#00c9a7}
.th-thu{color:#54a0ff}.th-fri{color:#f5c842}.th-sat{color:#e85d8a}.th-sun{color:#ff4757}
.th-inner{display:flex;align-items:center;justify-content:center;gap:4px}
.th-cnt{font-size:.56rem;color:var(--dim2);background:var(--s3);border-radius:10px;padding:1px 5px;font-weight:400}

/* 드라마 셀 */
.dcell{display:flex;border-radius:5px;overflow:hidden;border:1px solid var(--bd);
  margin-bottom:3px;transition:border-color .15s,transform .15s;position:relative}
.dcell:last-child{margin-bottom:0}
.dcell:hover{border-color:var(--bd2);transform:translateX(2px)}
.dcell.has-link{border-left:2px solid var(--a3)}
.dcell-bar{width:3px;flex-shrink:0;background:var(--bd2)}
.dcell.has-link .dcell-bar{background:var(--a3)}
.dcell-body{flex:1;min-width:0;padding:5px 7px;background:var(--s2)}
.dcell-title{font-size:var(--fs-cell);font-weight:700;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.dcell-sub{display:flex;align-items:center;gap:4px;margin-top:2px}
.dcell-ch{font-size:.58rem;color:var(--dim2);font-family:var(--mono)}
.dcell-eps{font-size:.56rem;color:var(--gold);font-family:var(--mono)}
.dcell-dl{display:inline-flex;align-items:center;gap:3px;margin-top:4px;
  font-size:.58rem;font-family:var(--mono);font-weight:700;padding:2px 6px;
  border-radius:4px;text-decoration:none;transition:background .15s;border:1px dashed var(--bd2);
  color:var(--dim2);cursor:pointer;background:none}
.dcell-dl.has{color:var(--a3);border:1px solid rgba(0,201,167,.3);background:rgba(0,201,167,.07)}
.dcell-dl.has:hover{background:rgba(0,201,167,.18)}
.dcell-dl.no:hover{border-color:var(--a3);color:var(--a3)}
.dcell-actions{position:absolute;top:3px;right:3px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.dcell:hover .dcell-actions{opacity:1}
.dact{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.62rem;transition:transform .1s}
.dact:active{transform:scale(.88)}
.dact-edit{background:rgba(79,142,247,.9);color:#fff}
.dact-del{background:rgba(255,71,87,.85);color:#fff}
.empty-cell{padding:16px 6px;text-align:center;color:var(--dim);font-size:.6rem;font-family:var(--mono);line-height:2}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(4,5,10,.82);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r3);
  padding:24px;width:92%;max-width:480px;transform:translateY(14px) scale(.97);transition:transform .25s;
  position:relative;max-height:92vh;overflow-y:auto}
.modal-bg.open .modal{transform:none}
.modal-close{position:absolute;top:13px;right:13px;background:var(--s3);border:none;color:var(--dim2);
  width:24px;height:24px;border-radius:6px;font-size:.88rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:color .2s}
.modal-close:hover{color:var(--txt)}
.modal h2{font-family:var(--mono);font-size:1rem;font-weight:700;margin-bottom:16px}
.ss{margin-bottom:18px}
.ss h3{font-size:.63rem;color:var(--dim2);font-family:var(--mono);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.ss h3::after{content:'';flex:1;height:1px;background:var(--bd)}
.sr{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.sr label{font-size:.63rem;color:var(--dim2);font-family:var(--mono)}
.sr input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);
  padding:8px 11px;color:var(--txt);font-size:.8rem;font-family:var(--mono);outline:none;transition:border-color .2s}
.sr input:focus{border-color:var(--a1)}
.sr input::placeholder{color:var(--dim)}
.sh{font-size:.58rem;color:var(--dim);line-height:1.5;margin-top:2px}
.sh a{color:var(--a1);text-underline-offset:2px}
.btn-ss{width:100%;padding:9px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;
  font-size:.82rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:opacity .2s}
.btn-ss:hover{opacity:.88}
.ss-st{margin-top:9px;font-size:.68rem;font-family:var(--mono);text-align:center;min-height:16px}
.ss-st.ok{color:var(--a3)}.ss-st.err{color:var(--warn)}
.sw{position:relative;margin-bottom:11px}
.sw input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);
  padding:10px 42px 10px 12px;color:var(--txt);font-size:.85rem;font-family:var(--sans);outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--a1)}
.sw input::placeholder{color:var(--dim)}
.sg{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:var(--a1);border:none;color:#fff;width:28px;height:28px;
  border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sg:hover{opacity:.8}
.sr-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto}
.ri{display:flex;gap:10px;padding:9px;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--r);cursor:pointer;transition:border-color .2s,background .2s;align-items:flex-start}
.ri:hover{border-color:var(--a1);background:var(--s3)}
.rp{width:44px;height:66px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--s3)}
.rpp{width:44px;height:66px;border-radius:5px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:1rem;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-title{font-size:.82rem;font-weight:700;margin-bottom:2px;word-break:keep-all}
.ri-en{font-size:.62rem;color:var(--dim2);font-family:var(--mono);margin-bottom:3px}
.ri-bgs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.ri-ov{font-size:.6rem;color:var(--dim2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sm{text-align:center;padding:20px;color:var(--dim);font-size:.75rem;font-family:var(--mono);line-height:1.8}
.bg{font-size:.54rem;font-family:var(--mono);border-radius:4px;padding:1px 5px;white-space:nowrap}
.bg-kr{background:rgba(0,201,167,.12);color:var(--a3);border:1px solid rgba(0,201,167,.2)}
.bg-sc{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.ep{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.epp{width:60px;height:90px;border-radius:7px;background:var(--s3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:1.3rem;overflow:hidden}
.epp img{width:100%;height:100%;object-fit:cover}
.em h3{font-size:.88rem;font-weight:700;margin-bottom:2px;word-break:keep-all}
.em p{font-size:.62rem;color:var(--dim2);font-family:var(--mono);line-height:1.6}
.field{margin-bottom:11px}
.field label{display:block;font-size:.62rem;color:var(--dim2);font-family:var(--mono);letter-spacing:.05em;margin-bottom:4px}
.field input,.field textarea{width:100%;background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--r);padding:8px 11px;color:var(--txt);font-size:.82rem;font-family:var(--sans);
  outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus{border-color:var(--a1)}
.field input::placeholder,.field textarea::placeholder{color:var(--dim)}
.field textarea{resize:vertical;min-height:55px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dl-field label{color:var(--a3)!important;font-weight:600}
.dl-field input{border-color:rgba(0,201,167,.3)!important;background:rgba(0,201,167,.04)!important}
.dl-field input:focus{border-color:var(--a3)!important;box-shadow:0 0 0 3px rgba(0,201,167,.1)!important}
.dl-hint{font-size:.6rem;color:var(--dim);margin-top:3px}
.dl-hint.active{color:var(--a3)}
.day-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.dp-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--bd2);background:var(--s2);
  color:var(--dim2);font-size:.7rem;font-family:var(--sans);cursor:pointer;transition:all .2s}
.dp-btn:hover{border-color:var(--a1);color:var(--a1)}
.dp-btn.on{background:var(--a1);border-color:var(--a1);color:#fff;font-weight:700}
.dp-btn[data-d="토"].on{background:var(--a2);border-color:var(--a2)}
.dp-btn[data-d="일"].on{background:#ff4757;border-color:#ff4757}
.btn-row{display:flex;gap:7px;margin-top:16px}
.btn-save{flex:1;padding:9px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;
  font-size:.83rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:.88}
.btn-cancel{padding:9px 14px;border-radius:var(--r);border:1px solid var(--bd2);
  background:var(--s2);color:var(--dim2);font-size:.8rem;font-family:var(--sans);cursor:pointer}
.btn-cancel:hover{color:var(--txt)}
.lm-ss{margin-bottom:18px}
.lm-ss h3{font-size:.63rem;color:var(--dim2);font-family:var(--mono);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.lm-ss h3::after{content:'';flex:1;height:1px;background:var(--bd)}
.lm-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.lm-label{font-size:.66rem;color:var(--dim2);font-family:var(--mono);width:100px;flex-shrink:0}
.lm-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:var(--bd2);border-radius:2px;outline:none;cursor:pointer}
.lm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--a1);cursor:pointer}
.lm-val{font-size:.66rem;font-family:var(--mono);color:var(--a1);width:40px;text-align:right;flex-shrink:0}
.btn-lm-reset{background:var(--s2);border:1px solid var(--bd2);color:var(--dim2);
  padding:5px 12px;border-radius:var(--r);font-size:.68rem;font-family:var(--mono);cursor:pointer}
.btn-lm-reset:hover{border-color:var(--a2);color:var(--a2)}
.spin{width:26px;height:26px;border-radius:50%;border:3px solid var(--bd2);
  border-top-color:var(--a1);animation:spin .7s linear infinite;margin:14px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.lw{padding:22px;text-align:center;color:var(--dim);font-size:.7rem;font-family:var(--mono)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-weight:700;
  padding:8px 18px;border-radius:30px;font-size:.78rem;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo-mark">🎬</div>
  <div class="logo-text">
    <h1>드라마 편성표</h1>
    <p id="repoLabel">GitHub 연동 대기 중</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-stat" id="statTotal">0개</div>
    <div class="sync-status syncing" id="syncStatus"><div class="sync-dot"></div><span id="syncText">연결 중</span></div>
    <button class="btn-icon" onclick="openLayout()" title="레이아웃">⊞</button>
    <button class="btn-icon" onclick="openSettings()" title="설정">⚙️</button>
    <button class="btn-icon" onclick="uploadSelf()" title="GitHub 업로드" id="btnUpload" style="display:none">📤</button>
    <button class="btn-add" onclick="openSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      추가
    </button>
  </div>
</header>

<div id="setupBanner" class="setup-banner" style="display:none">
  ⚡ GitHub & TMDB 연동이 필요해요.
  <button onclick="openSettings()">지금 설정하기</button>
</div>

<div class="week-wrap">
  <table class="sched" id="sched">
    <thead><tr id="thead"></tr></thead>
    <tbody><tr id="tbody"></tr></tbody>
  </table>
</div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settingsModal">
  <div class="modal" style="max-width:440px">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2>⚙️ 설정</h2>
    <div class="ss"><h3>GitHub</h3>
      <div class="sr"><label>Personal Access Token</label><input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"><div class="sh"><a href="https://github.com/settings/tokens/new?scopes=repo&description=drama-manager" target="_blank">토큰 발급하기 →</a> (repo 권한)</div></div>
      <div class="sr"><label>레포지토리 (owner/repo)</label><input type="text" id="cfgRepo" placeholder="예) diskpark/drama-manager"></div>
      <div class="sr"><label>브랜치</label><input type="text" id="cfgBranch" placeholder="main"></div>
      <div class="sr"><label>데이터 파일 경로</label><input type="text" id="cfgFile" placeholder="dramas.json"></div>
    </div>
    <div class="ss"><h3>TMDB</h3>
      <div class="sr"><label>API Key (v3) 또는 Bearer Token</label><input type="password" id="cfgTmdb" placeholder="API 키 입력"><div class="sh"><a href="https://www.themoviedb.org/settings/api" target="_blank">TMDB API 키 발급 →</a> (무료)</div></div>
    </div>
    <button class="btn-ss" onclick="saveSettings()">✓ 저장 & 연결 테스트</button>
    <div class="ss-st" id="settingStatus"></div>
  </div>
</div>

<!-- SEARCH MODAL -->
<div class="modal-bg" id="searchModal">
  <div class="modal">
    <button class="modal-close" onclick="closeSearch()">✕</button>
    <h2>🔍 드라마 검색</h2>
    <div class="sw">
      <input type="text" id="searchQ" placeholder="드라마 제목 (한글 / 영문)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="sg" onclick="doSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="sr-list" id="searchResults"><div class="sm">드라마 제목을 검색하면<br>TMDB에서 자동으로 정보를 가져와요</div></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h2>✏️ 편집</h2>
    <div class="ep">
      <div class="epp" id="editPoster">🎬</div>
      <div class="em"><h3 id="editTitle">-</h3><p id="editSub">-</p></div>
    </div>
    <div class="field dl-field">
      <label>⬇ 다운로드 링크</label>
      <input type="url" id="editLink" placeholder="https://..." oninput="updateDlHint()">
      <div class="dl-hint" id="dlHint">링크를 입력하면 카드에서 바로 클릭해 이동할 수 있어요</div>
    </div>
    <div class="field-row">
      <div class="field"><label>총 편수</label><input type="text" id="editEps" placeholder="예) 16"></div>
      <div class="field"><label>채널</label><input type="text" id="editCh" placeholder="예) tvN"></div>
    </div>
    <div class="field">
      <label>방영 요일</label>
      <div class="day-picker" id="editDayPicker">
        <button class="dp-btn" data-d="월">월</button><button class="dp-btn" data-d="화">화</button>
        <button class="dp-btn" data-d="수">수</button><button class="dp-btn" data-d="목">목</button>
        <button class="dp-btn" data-d="금">금</button><button class="dp-btn" data-d="토">토</button>
        <button class="dp-btn" data-d="일">일</button>
      </div>
    </div>
    <div class="field"><label>메모</label><textarea id="editMemo" placeholder="자유 메모..."></textarea></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEdit()">취소</button>
      <button class="btn-save" onclick="saveEdit()">💾 저장</button>
    </div>
  </div>
</div>

<!-- LAYOUT MODAL -->
<div class="modal-bg" id="layoutModal">
  <div class="modal" style="max-width:400px">
    <button class="modal-close" onclick="closeLayout()">✕</button>
    <h2>⊞ 레이아웃 설정</h2>
    <div class="lm-ss"><h3>텍스트</h3>
      <div class="lm-row"><span class="lm-label">셀 폰트 크기</span><input class="lm-slider" type="range" id="slFs" min="0.55" max="1.1" step="0.05" oninput="applyLayout()"><span class="lm-val" id="valFs">.75rem</span></div>
    </div>
    <div class="lm-ss"><h3>간격 & 여백</h3>
      <div class="lm-row"><span class="lm-label">컬럼 간격</span><input class="lm-slider" type="range" id="slGap" min="0" max="20" step="1" oninput="applyLayout()"><span class="lm-val" id="valGap">4px</span></div>
      <div class="lm-row"><span class="lm-label">표 여백</span><input class="lm-slider" type="range" id="slPad" min="4" max="36" step="2" oninput="applyLayout()"><span class="lm-val" id="valPad">10px</span></div>
      <div class="lm-row"><span class="lm-label">헤더 높이</span><input class="lm-slider" type="range" id="slHdr" min="6" max="24" step="1" oninput="applyLayout()"><span class="lm-val" id="valHdr">12px</span></div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn-lm-reset" onclick="resetLayout()">↺ 초기화</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['월','화','수','목','금','토','일'];
const TH_CLS={'월':'th-mon','화':'th-tue','수':'th-wed','목':'th-thu','금':'th-fri','토':'th-sat','일':'th-sun'};
const TMDB_IMG='https://image.tmdb.org/t/p/w342';
const TMDB_BASE='https://api.themoviedb.org/3';
let dramas=[],editId=null,editDays=[],ghSha=null;
function cfg(k){return localStorage.getItem(k)||'';}

// GITHUB
function ghH(){return{'Authorization':`token ${cfg('gh_token')}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};}
function ghUrl(){return`https://api.github.com/repos/${cfg('gh_repo')}/contents/${cfg('gh_file')||'dramas.json'}?ref=${cfg('gh_branch')||'main'}`;}
async function ghLoad(){
  setSS('syncing','불러오는 중');
  try{
    const r=await fetch(ghUrl(),{headers:ghH()});
    if(r.status===404){dramas=[];ghSha=null;setSS('ok','연결됨');render();return;}
    if(!r.ok)throw new Error(`GitHub ${r.status}`);
    const d=await r.json();ghSha=d.sha;
    dramas=JSON.parse(atob(d.content.replace(/\n/g,'')));
    setSS('ok','동기화 완료');render();
  }catch(e){
    setSS('err','연결 실패');toast('GitHub 연결 실패: '+e.message);
    const c=localStorage.getItem('dramas_cache');
    if(c){try{dramas=JSON.parse(c);render();}catch(x){}}
  }
}
async function ghSave(){
  setSS('syncing','저장 중');
  const json=JSON.stringify(dramas,null,2);
  localStorage.setItem('dramas_cache',json);
  try{
    const body={message:`Update dramas.json [${new Date().toLocaleString('ko-KR')}]`,content:btoa(unescape(encodeURIComponent(json))),branch:cfg('gh_branch')||'main'};
    if(ghSha)body.sha=ghSha;
    const r=await fetch(`https://api.github.com/repos/${cfg('gh_repo')}/contents/${cfg('gh_file')||'dramas.json'}`,{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
    const d=await r.json();ghSha=d.content.sha;setSS('ok','저장 완료');
  }catch(e){setSS('err','저장 실패');toast('저장 실패: '+e.message);}
}
function setSS(t,x){document.getElementById('syncStatus').className='sync-status '+t;document.getElementById('syncText').textContent=x;}

// SETTINGS
function openSettings(){
  document.getElementById('cfgToken').value=cfg('gh_token');
  document.getElementById('cfgRepo').value=cfg('gh_repo');
  document.getElementById('cfgBranch').value=cfg('gh_branch')||'main';
  document.getElementById('cfgFile').value=cfg('gh_file')||'dramas.json';
  document.getElementById('cfgTmdb').value=cfg('tmdb_key');
  document.getElementById('settingStatus').textContent='';
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
async function saveSettings(){
  const token=document.getElementById('cfgToken').value.trim();
  const repo=document.getElementById('cfgRepo').value.trim();
  const branch=document.getElementById('cfgBranch').value.trim()||'main';
  const file=document.getElementById('cfgFile').value.trim()||'dramas.json';
  const tmdb=document.getElementById('cfgTmdb').value.trim();
  const st=document.getElementById('settingStatus');
  if(!token||!repo){st.textContent='토큰과 레포지토리를 입력해주세요';st.className='ss-st err';return;}
  localStorage.setItem('gh_token',token);localStorage.setItem('gh_repo',repo);
  localStorage.setItem('gh_branch',branch);localStorage.setItem('gh_file',file);
  if(tmdb)localStorage.setItem('tmdb_key',tmdb);
  st.textContent='연결 테스트 중...';st.className='ss-st';
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}`,{headers:ghH()});
    if(!r.ok)throw new Error('레포지토리를 찾을 수 없어요');
    st.textContent='✓ 연결 성공!';st.className='ss-st ok';
    document.getElementById('repoLabel').textContent=repo;
    document.getElementById('setupBanner').style.display='none';
    setTimeout(()=>{closeSettings();ghLoad();},700);
  }catch(e){st.textContent='✗ 연결 실패: '+e.message;st.className='ss-st err';}
}

// TMDB
function tH(){const k=cfg('tmdb_key');return k.length>40?{'Authorization':`Bearer ${k}`,'Content-Type':'application/json'}:{};}
function tP(){const k=cfg('tmdb_key');return k.length>40?'':'&api_key='+k;}
async function doSearch(){
  const q=document.getElementById('searchQ').value.trim();
  if(!q){toast('검색어를 입력해주세요');return;}
  if(!cfg('tmdb_key')){toast('설정에서 TMDB API 키를 먼저 입력해주세요');openSettings();return;}
  const box=document.getElementById('searchResults');
  box.innerHTML='<div class="lw"><div class="spin"></div>검색 중...</div>';
  try{
    const isKo=/[ㄱ-ㅎ가-힣]/.test(q);
    const r=await fetch(`${TMDB_BASE}/search/tv?query=${encodeURIComponent(q)}&language=${isKo?'ko-KR':'en-US'}&include_adult=false${tP()}`,{headers:tH()});
    const data=await r.json();
    if(!data.results?.length){box.innerHTML='<div class="sm">결과 없음. 영문명으로도 시도해보세요</div>';return;}
    const sorted=[...data.results].sort((a,b)=>{
      const aKr=(a.origin_country||[]).includes('KR')?0:1;
      const bKr=(b.origin_country||[]).includes('KR')?0:1;
      return aKr-bKr||b.popularity-a.popularity;
    });
    box.innerHTML=sorted.slice(0,8).map(r=>{
      const poster=r.poster_path?`<img class="rp" src="${TMDB_IMG}${r.poster_path}" loading="lazy">`:`<div class="rpp">🎬</div>`;
      const year=r.first_air_date?r.first_air_date.slice(0,4):'';
      const kr=(r.origin_country||[]).includes('KR')?`<span class="bg bg-kr">🇰🇷</span>`:'';
      const sc=r.vote_average?`<span class="bg bg-sc">★${r.vote_average.toFixed(1)}</span>`:'';
      return `<div class="ri" onclick="selectDrama(${r.id})">${poster}<div class="ri-info"><div class="ri-title">${esc(r.name)}</div><div class="ri-en">${esc(r.original_name)}${year?' · '+year:''}</div><div class="ri-bgs">${kr}${sc}</div><div class="ri-ov">${esc(r.overview||'')}</div></div></div>`;
    }).join('');
  }catch(e){box.innerHTML=`<div class="sm">오류: ${e.message}</div>`;}
}
async function selectDrama(tmdbId){
  const box=document.getElementById('searchResults');
  box.innerHTML='<div class="lw"><div class="spin"></div>상세 정보 가져오는 중...</div>';
  try{
    const [krR,enR]=await Promise.all([
      fetch(`${TMDB_BASE}/tv/${tmdbId}?language=ko-KR${tP()}`,{headers:tH()}),
      fetch(`${TMDB_BASE}/tv/${tmdbId}?language=en-US${tP()}`,{headers:tH()})
    ]);
    const [kr,en]=await Promise.all([krR.json(),enR.json()]);
    let days=[];
    const refEp=en.next_episode_to_air||en.last_episode_to_air;
    const refDate=refEp?.air_date||en.last_air_date||kr.first_air_date;
    if(refDate){const dow=new Date(refDate+'T12:00:00').getDay();const map=[6,0,1,2,3,4,5];const idx=map[dow];if(idx!==undefined)days=[DAYS[idx]];}
    const existing=dramas.find(d=>d.tmdbId===tmdbId);
    if(existing){toast('이미 추가된 드라마입니다');closeSearch();setTimeout(()=>openEdit(existing.id),150);return;}
    const drama={id:Date.now(),tmdbId,kr:kr.name||en.name,en:en.original_name||en.name,
      poster:kr.poster_path||en.poster_path,eps:en.number_of_episodes||'',seasons:en.number_of_seasons||1,
      ch:(kr.networks||[])[0]?.name||(en.networks||[])[0]?.name||'',days,
      firstAir:kr.first_air_date||'',status:kr.status||en.status||'',link:'',memo:'',
      overview:kr.overview||en.overview||''};
    dramas.push(drama);render();await ghSave();closeSearch();
    setTimeout(()=>{openEdit(drama.id);toast(`✓ "${drama.kr}" 추가! 다운로드 링크를 입력해보세요`);},150);
  }catch(e){box.innerHTML=`<div class="sm">오류: ${e.message}</div>`;}
}

// RENDER
function render(){
  document.getElementById('statTotal').textContent=dramas.length+'개';
  document.getElementById('thead').innerHTML=DAYS.map(d=>{
    const cnt=dramas.filter(x=>(x.days||[]).includes(d)).length;
    return `<th class="${TH_CLS[d]}"><div class="th-inner">${d}요일<span class="th-cnt">${cnt}</span></div></th>`;
  }).join('');
  document.getElementById('tbody').innerHTML='<tr>'+DAYS.map(d=>{
    const list=dramas.filter(x=>(x.days||[]).includes(d));
    return `<td>${list.length?list.map(cellHTML).join(''):'<div class="empty-cell">편성없음</div>'}</td>`;
  }).join('')+'</tr>';
}
function cellHTML(d){
  const has=!!d.link;
  const dl=has
    ?`<a class="dcell-dl has" href="${esc(d.link)}" target="_blank" onclick="event.stopPropagation()">⬇ 다운로드</a>`
    :`<button class="dcell-dl no" onclick="event.stopPropagation();openEdit(${d.id})">+ 링크추가</button>`;
  return `<div class="dcell${has?' has-link':''}" data-id="${d.id}">
    <div class="dcell-bar"></div>
    <div class="dcell-body">
      <div class="dcell-title">${esc(d.kr)}</div>
      <div class="dcell-sub">${d.ch?`<span class="dcell-ch">${esc(d.ch)}</span>`:''}${d.eps?`<span class="dcell-eps">${d.eps}부작</span>`:''}</div>
      ${dl}
    </div>
    <div class="dcell-actions">
      <button class="dact dact-edit" onclick="event.stopPropagation();openEdit(${d.id})" title="편집">✏</button>
      <button class="dact dact-del" onclick="event.stopPropagation();delDrama(${d.id})" title="삭제">✕</button>
    </div>
  </div>`;
}

// EDIT
function openEdit(id){
  const d=dramas.find(x=>x.id===id);if(!d)return;
  editId=id;editDays=[...(d.days||[])];
  document.getElementById('editPoster').innerHTML=d.poster?`<img src="${TMDB_IMG}${d.poster}">`:'🎬';
  document.getElementById('editTitle').textContent=d.kr||'-';
  document.getElementById('editSub').textContent=[d.en,d.firstAir,d.ch,d.eps?d.eps+'부작':''].filter(Boolean).join(' · ');
  document.getElementById('editLink').value=d.link||'';
  document.getElementById('editEps').value=d.eps||'';
  document.getElementById('editCh').value=d.ch||'';
  document.getElementById('editMemo').value=d.memo||'';
  updateDlHint();
  document.querySelectorAll('.dp-btn').forEach(btn=>{
    btn.classList.toggle('on',editDays.includes(btn.dataset.d));
    btn.onclick=()=>{const day=btn.dataset.d;if(editDays.includes(day)){editDays=editDays.filter(x=>x!==day);btn.classList.remove('on');}else{editDays.push(day);btn.classList.add('on');}};
  });
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('editLink').focus(),300);
}
function updateDlHint(){
  const v=document.getElementById('editLink').value.trim();
  const h=document.getElementById('dlHint');
  h.textContent=v?'✓ 링크 입력됨 — 저장하면 바로 이동 가능':'링크를 입력하면 카드에서 바로 클릭해 이동할 수 있어요';
  h.className='dl-hint'+(v?' active':'');
}
async function saveEdit(){
  const d=dramas.find(x=>x.id===editId);if(!d)return;
  d.link=document.getElementById('editLink').value.trim();
  d.eps=document.getElementById('editEps').value.trim();
  d.ch=document.getElementById('editCh').value.trim();
  d.memo=document.getElementById('editMemo').value.trim();
  d.days=[...editDays];
  render();closeEdit();toast('저장 중...');await ghSave();toast('✓ 저장 완료!');
}
function closeEdit(){document.getElementById('editModal').classList.remove('open');editId=null;}
async function delDrama(id){
  if(!confirm('삭제할까요?'))return;
  dramas=dramas.filter(d=>d.id!==id);render();await ghSave();toast('삭제됐어요');
}

// SEARCH MODAL
function openSearch(){
  if(!cfg('tmdb_key')){openSettings();return;}
  document.getElementById('searchModal').classList.add('open');
  document.getElementById('searchResults').innerHTML='<div class="sm">드라마 제목을 검색하면<br>TMDB에서 자동으로 정보를 가져와요</div>';
  document.getElementById('searchQ').value='';
  setTimeout(()=>document.getElementById('searchQ').focus(),200);
}
function closeSearch(){document.getElementById('searchModal').classList.remove('open');}

// LAYOUT
const LD={fs:.75,gap:4,pad:10,hdr:12};
function loadL(){return{...LD,...JSON.parse(localStorage.getItem('lv3')||'{}');};}
function applyLVars(l){
  const r=document.documentElement.style;
  r.setProperty('--fs-cell',l.fs+'rem');
  r.setProperty('--col-gap',l.gap+'px');
  r.setProperty('--tbl-pad',l.pad+'px');
  r.setProperty('--hdr-pad',l.hdr+'px');
}
function applyLayout(){
  const l={fs:+document.getElementById('slFs').value,gap:+document.getElementById('slGap').value,pad:+document.getElementById('slPad').value,hdr:+document.getElementById('slHdr').value};
  document.getElementById('valFs').textContent=l.fs.toFixed(2)+'rem';
  document.getElementById('valGap').textContent=l.gap+'px';
  document.getElementById('valPad').textContent=l.pad+'px';
  document.getElementById('valHdr').textContent=l.hdr+'px';
  applyLVars(l);localStorage.setItem('lv3',JSON.stringify(l));
}
function syncL(l){
  document.getElementById('slFs').value=l.fs;document.getElementById('valFs').textContent=l.fs.toFixed(2)+'rem';
  document.getElementById('slGap').value=l.gap;document.getElementById('valGap').textContent=l.gap+'px';
  document.getElementById('slPad').value=l.pad;document.getElementById('valPad').textContent=l.pad+'px';
  document.getElementById('slHdr').value=l.hdr;document.getElementById('valHdr').textContent=l.hdr+'px';
}
function openLayout(){syncL(loadL());document.getElementById('layoutModal').classList.add('open');}
function closeLayout(){document.getElementById('layoutModal').classList.remove('open');}
function resetLayout(){localStorage.removeItem('lv3');syncL({...LD});applyLVars({...LD});toast('↺ 초기화됐어요');}

// UPLOAD
async function uploadSelf(){
  if(!cfg('gh_token')||!cfg('gh_repo')){toast('먼저 ⚙️ 설정에서 GitHub 토큰을 입력해주세요');openSettings();return;}
  const repo=cfg('gh_repo'),branch=cfg('gh_branch')||'main';
  const btn=document.getElementById('btnUpload');
  if(!confirm(`📤 현재 index.html 을\n${repo} 에 업로드할까요?`))return;
  btn.textContent='⏳';btn.disabled=true;
  try{
    const gr=await fetch(`https://api.github.com/repos/${repo}/contents/index.html?ref=${branch}`,{headers:ghH()});
    let sha=null;if(gr.ok){const gd=await gr.json();sha=gd.sha;}
    const html=document.documentElement.outerHTML;
    const body={message:`Update index.html [${new Date().toLocaleString('ko-KR')}]`,content:btoa(unescape(encodeURIComponent(html))),branch};
    if(sha)body.sha=sha;
    const pr=await fetch(`https://api.github.com/repos/${repo}/contents/index.html`,{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
    if(!pr.ok){const e=await pr.json();throw new Error(e.message||pr.status);}
    btn.textContent='✅';toast(`✓ ${repo} 업로드 완료!`);
    setTimeout(()=>{btn.textContent='📤';btn.disabled=false;},3000);
  }catch(e){btn.textContent='📤';btn.disabled=false;toast('업로드 실패: '+e.message);}
}

// UTILS
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}

['searchModal','editModal','settingsModal','layoutModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open');});
});

(function init(){
  applyLVars(loadL());
  if(!location.hostname.endsWith('github.io'))document.getElementById('btnUpload').style.display='';
  const hasConfig=cfg('gh_token')&&cfg('gh_repo');
  if(!hasConfig){document.getElementById('setupBanner').style.display='flex';setSS('err','설정 필요');render();return;}
  document.getElementById('repoLabel').textContent=cfg('gh_repo');
  const cache=localStorage.getItem('dramas_cache');
  if(cache){try{dramas=JSON.parse(cache);render();}catch(e){}}
  ghLoad();
})();
</script>
</body>
